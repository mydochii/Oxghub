<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://omg10.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/AdCz1YNi1.mp4","M4L4M S3P1 B1K1N P1K1R4N M3L4Y4NG"],
  ["https://cdn2.videy.co/4EQLMeGe1.mp4","D14M K3H3N1NG4N R454 1TV M3NCV4T"],
  ["https://cdn2.videy.co/ogONUKTK1.mp4","P4ND4NG4N S1NGK4T Y4NG T4K B154 D1LVP4K4N"],
  ["https://cdn2.videy.co/nG2hhuD81.mp4","K3D3K4T4N H4LVS T4NP4 B4NY4K K4T4"],
  ["https://cdn2.videy.co/j207Tf9Z1.mp4","M0M3N K3C1L Y4NG M3NGVB4H SV45N4"],
  ["https://cdn2.videy.co/6oARaVYo1.mp4","R454 4N3H D4T4NG D14M D14M"],
  ["https://cdn2.videy.co/VLUO3lxt1.mp4","M4L4M P4NJ4NG B1K1N H4T1 T4K T3N4NG"],
  ["https://cdn2.videy.co/LZtFzwYA1.mp4","D14M K4M4R T3RTVTVP SV45N4 J4D1 B3RB3D4"],
  ["https://cdn2.videy.co/sD5XOc2i1.mp4","K3P1NCVT K3C1L J4D1 4W4L C3R1T4"],
  ["https://cdn2.videy.co/BKw7yrbZ1.mp4","S3NYVM S3D3RH4N Y4NG B1K1N S4L4H T1NGK4H"],
  ["https://cdn2.videy.co/CUtxRysY1.mp4","P4ND4NG4N D3K4T M3MBV4T J4NTVNG B3RD3B4R"],
  ["https://cdn2.videy.co/GZbwG4up1.mp4","K3H3N1NG4N M4L4M J4D1 S4K51"],
  ["https://cdn2.videy.co/bChyPd9Q1.mp4","R454 H4NG4T T3R454 D1 B4L1K D14M"],
  ["https://cdn2.videy.co/1wVwhDPk1.mp4","M0M3N S1NGK4T Y4NG M3N1NGG4LK4N K3N4NG"],
  ["https://cdn2.videy.co/btjvUwl71.mp4","M4L4M 1NV M3MBV4T S3M54N4 J4D1 B3RVB4H"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
